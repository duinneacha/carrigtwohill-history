<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Historical Map — Carrigtwohill</title>

<!-- Leaflet 1.9.4 -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<!-- Leaflet MarkerCluster -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<!-- Leaflet GestureHandling -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-gesture-handling@1.2.2/dist/leaflet-gesture-handling.min.css">
<script src="https://unpkg.com/leaflet-gesture-handling@1.2.2/dist/leaflet-gesture-handling.min.js"></script>

<!-- Turf.js (for point-in-polygon) -->
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<!-- Map styles -->
<link rel="stylesheet" href="/static/css/map.css">
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="header-crest">&#x1F3F0;</div>
    <div class="header-text">
      <h1>Carrigtwohill Interactive Historical Map</h1>
      <p>Explore the townlands, landmarks and people of our parish through history</p>
    </div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <a href="/">Articles</a>
    <a href="/persons">Notable Persons</a>
    <a href="/map" class="active">Historical Map</a>
  </div>
</nav>

<!-- MAP + SIDEBAR -->
<div class="map-container">

  <!-- LEAFLET MAP -->
  <div id="map">
    <!-- Controls overlaid on map -->
    <div class="map-controls">
      <!-- Era Filter -->
      <div class="control-panel">
        <div class="control-panel-head" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
          <span>Era Filter</span>
          <span>&#9660;</span>
        </div>
        <div class="control-panel-body">
          <div class="era-filters" id="era-filters"></div>
        </div>
      </div>

      <!-- Layers -->
      <div class="control-panel">
        <div class="control-panel-head" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
          <span>Layers</span>
          <span>&#9660;</span>
        </div>
        <div class="control-panel-body" id="layer-controls">
        </div>
      </div>

      <!-- What Was Here -->
      <div class="control-panel">
        <div class="control-panel-body" style="padding:8px 10px;">
          <button class="wwh-btn" id="wwh-btn" onclick="CarrigMap.toggleWWH()">
            What Was Here?
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="map-sidebar">
    <div class="sidebar-header">
      <span id="sidebar-title">Explore</span>
      <button class="close-btn" onclick="CarrigMap.closeSidebar()" title="Close">&times;</button>
    </div>
    <div class="sidebar-body" id="sidebar-body">
      <!-- Populated by map.js -->
    </div>
  </div>

</div>

<!-- Map JS -->
<script src="/static/js/map.js"></script>

</body>
</html>
